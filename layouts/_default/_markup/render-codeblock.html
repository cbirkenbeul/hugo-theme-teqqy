{{- $lang := .Type -}}
<div class="code-block">
  <div class="code-block-header">
    <span class="code-lang-label">{{ $lang }}</span>
    <button class="code-copy-btn" type="button" aria-label="{{ i18n "copyCode" }}" data-umami-event="Code Copy" data-umami-event-lang="{{ $lang }}">
      <svg class="icon-copy" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      <svg class="icon-check" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </button>
  </div>
  {{- transform.Highlight (trim .Inner "\n") $lang -}}
</div>
